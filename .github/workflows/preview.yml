name: Preview Deployments

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'apps/website/**'
      - 'apps/admin/**'
      - 'packages/**'
      - '.github/workflows/preview.yml'

jobs:
  preview-placeholder:
    name: Preview placeholder (provider not configured)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip until hosting secrets exist
        run: |
          echo "Configure Vercel/Netlify/Cloudflare credentials as repository secrets,"
          echo "then replace this job with real website/admin preview deployments."
          echo "No secrets are required for pull request validation."
