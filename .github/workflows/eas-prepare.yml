name: EAS Prepare

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/eas-prepare.yml'

jobs:
  eas-prepare:
    name: Validate Expo config (no paid build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install monorepo dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Export Expo config
        run: npx expo config --type public

      - name: Remind EAS credentials are external
        run: |
          echo "EAS Build/Submit require EXPO_TOKEN and project linkage."
          echo "This workflow intentionally does not start a paid native build."
